# sub2api + image-studio 生产 nginx 配置
# 用法: ln -sf /path/to/deploy/site-nginx.conf /etc/nginx/sites-enabled/sub2api
#
# 修改: 域名、SSL 证书路径、后端端口（如有变动）
# 当前: cc.atai8.cc, sub2api :3080, image-studio :7000
#
# 依赖主 nginx.conf 已定义:
#   - map $http_upgrade $connection_upgrade
#   - ssl_protocols TLSv1.2 TLSv1.3
#   - ssl_prefer_server_ciphers on
#   - gzip on

server {
    listen 80;
    server_name cc.atai8.cc;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cc.atai8.cc;

    ssl_certificate     /etc/nginx/ssl/atai8.cc.pem;
    ssl_certificate_key /etc/nginx/ssl/atai8.cc.key;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 允许大请求体（LLM 长上下文）
    client_max_body_size 0;

    # ── /internal/ 绝不暴露到公网 ──
    location /internal/ {
        deny all;
        return 403;
    }

    # ── image-studio 子应用（SSE 流式出图）──
    location /image-studio/ {
        proxy_pass http://127.0.0.1:7000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        tcp_nodelay on;

        proxy_connect_timeout 120s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── 主站：sub2api（API 网关 + 内嵌前端）──
    location / {
        proxy_pass http://127.0.0.1:3080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 升级（Responses WS 路径需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 流式输出核心：关闭缓冲
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        tcp_nodelay on;
        tcp_nopush off;

        proxy_connect_timeout 120s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
